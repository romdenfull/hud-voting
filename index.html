<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUD Vote - Spin&Go</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase UMD build -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1>🎲 HUD Vote | Spin&Go</h1>
    <div id="user-panel" class="hidden">
      <span id="user-info"></span>
      <button id="logout-btn" class="btn secondary">Выйти</button>
    </div>
  </header>

  <main>
    <section id="login-section">
      <h2>Вход для участников</h2>
      <form id="login-form">
        <input type="text" id="code-input" placeholder="Введите ваш код доступа" required>
        <button type="submit" class="btn primary">Войти</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </section>

    <section id="polls-section" class="hidden">
      <h2>Активные голосования</h2>
      <div id="polls-container" class="grid"></div>
    </section>
  </main>

  <footer>
    <p>Проект для сообщества GipsyTeam | Результаты обновляются автоматически</p>
  </footer>

  <!-- Наши скрипты: config ДО app -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
